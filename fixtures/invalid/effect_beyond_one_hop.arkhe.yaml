# Invalid: Effect paths reach at most one hop from the target (ADR 0005).
module: invalid_case
version: 0.1.0
arkhe: '0.1'
roles:
  operator: {}
entities:
  Widget:
    keys:
    - widget_id
    properties:
      widget_id:
        type: string
      status:
        type: state
        values:
        - new
        - active
        initial: new
actions:
  activate:
    target: Widget
    guard: target.status == "new"
    authority: operator
    audit: standard
    effects:
    - target.a.b.c: x
