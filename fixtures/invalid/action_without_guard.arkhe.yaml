# Invalid: Every action must declare a guard.
module: invalid_case
version: 0.1.0
arkhe: '0.1'
roles:
  operator: {}
entities:
  Widget:
    keys:
    - widget_id
    properties:
      widget_id:
        type: string
      status:
        type: state
        values:
        - new
        - active
        initial: new
actions:
  activate:
    target: Widget
    authority: operator
    audit: standard
    effects:
    - target.status: active
