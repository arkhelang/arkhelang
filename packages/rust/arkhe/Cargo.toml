[package]
name = "arkhe"
version = "0.1.0"
edition = "2021"
description = "CLI for Arkhe, an ontology language for AI systems (Rust port, early development)."
license = "Apache-2.0"
repository = "https://github.com/arkhelang"
readme = "README.md"
keywords = ["ontology", "ai", "agents", "cli", "governance"]
categories = ["command-line-utilities"]

[[bin]]
name = "arkhe"
path = "src/main.rs"

[dependencies]
arkhelang = { path = "../arkhelang", version = "0.1.0" }
